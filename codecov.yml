coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 50%
        threshold: 5%

comment:
  layout: 'condensed_header, condensed_files, condensed_footer'
  require_changes: true

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: unit
      paths:
        - src/
    - name: kat
      paths:
        - src/
    - name: integration
      paths:
        - src/

ignore:
  - 'test/**/*'
  - 'coverage/**/*'
  - '**/*.spec.ts'
  - '**/*.test.ts'
  - 'wrangler.jsonc'
  - 'dist/**/*'
  - 'build.ts'
