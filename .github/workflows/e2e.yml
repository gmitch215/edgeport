name: Integration (E2E)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Cache Docker Images
        if: ${{ !cancelled() }}
        uses: actions/cache@v6
        with:
          path: /tmp/docker-images
          key: docker-${{ runner.os }}-${{ hashFiles('docker/**') }}
      - name: Load or Pull Docker Images
        run: |
          if [ -f /tmp/docker-images/images.tar ]; then
            docker load -i /tmp/docker-images/images.tar
          else
            docker compose -f docker/compose.yml pull
            mkdir -p /tmp/docker-images
            docker compose -f docker/compose.yml config --images | sort -u | xargs docker save -o /tmp/docker-images/images.tar
          fi
      - name: Boot Integration Servers
        run: docker compose -f docker/compose.yml up -d --wait
      - name: Tune TCP for High Localhost Connection Churn
        # general hardening for the volume of short-lived localhost connections the suite opens
        # (widen the ephemeral-port range, reuse/drain TIME_WAIT, enlarge the accept/SYN backlogs).
        # NOTE: the historic "FTP flakiness" was NOT port exhaustion - it was the Alpine/musl vsftpd
        # image segfaulting under the passive-heavy FTP load; that is fixed in docker/compose.yml by
        # using pure-ftpd. these sysctls are kept as cheap defense-in-depth, not the fix.
        run: |
          sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.ipv4.tcp_fin_timeout=10
          sudo sysctl -w net.ipv4.tcp_max_tw_buckets=2000000
          sudo sysctl -w net.core.somaxconn=4096
          sudo sysctl -w net.ipv4.tcp_max_syn_backlog=4096
      - name: Run Integration Tests
        uses: nick-fields/retry@v4
        env:
          INTEGRATION: '1'
        with:
          timeout_minutes: 15
          # retry is a backstop for transient boot/timing hiccups; the FTP server crash that used
          # to make retries pointless is fixed at the container level, so a short wait is enough
          max_attempts: 3
          retry_wait_seconds: 20
          command: bunx vitest run --coverage --reporter=default --reporter=junit --outputFile=test-report.junit.xml
      - name: Upload Coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration
          files: coverage/clover.xml
      - name: Upload Test Results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          flags: integration
          files: test-report.junit.xml
      - name: Dump Server Logs on Failure
        if: ${{ failure() }}
        run: docker compose -f docker/compose.yml logs --no-color
      - name: Teardown Servers
        if: ${{ always() }}
        run: docker compose -f docker/compose.yml down -v
