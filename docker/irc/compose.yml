services:
  irc:
    image: ghcr.io/ergochat/ergo@sha256:98975f36281cc4d65ed00bfd2764a4e6794ed39c354de385561f74d0c7ad12ef
    volumes:
      - ./ircd.yaml:/ircd/ircd.yaml:ro
    healthcheck:
      test: ['CMD', 'sh', '-c', 'nc -z 127.0.0.1 6667']
      interval: 2s
      timeout: 2s
      retries: 40
    ports:
      - '127.0.0.1:6667:6667'
