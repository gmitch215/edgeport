#!KAMAILIO
#
# edgeport SIP integration-test rig - Kamailio 5.6.x
#
# purpose: exercise the edgeport SIP client (REGISTER / MESSAGE / MSRP) against a
# real registrar+proxy over TCP. everything is in-memory (usrloc db_mode=0) so there
# is NO database - digest credentials are a single static realm password verified with
# the auth module's pv_www_authenticate / pv_proxy_authenticate.
#
#   realm     : edgeport.test          (server always challenges with this realm)
#   user      : tester                 (any username works; password is realm-static)
#   password  : testpass               (plaintext, verified via pv_www_authenticate)
#   SIP        : tcp/udp 5060           (Cloudflare Workers are TCP-only -> TCP is the target)
#   SIP/TLS    : tcp 5061               (nice-to-have, self-signed)
#   MSRP relay : tcp 2855               (msrp module, RFC 4975/4976 relay)
#

####### Defines #######

# realm the server challenges with (edit here to change it everywhere)
#!substdef "!SIP_REALM!edgeport.test!g"
#!substdef "!SIP_PASSWORD!testpass!g"

# enable TLS listener only when the cert files are present (entrypoint decides)
#!ifdef WITH_TLS
#!endif

####### Global Parameters #########

debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
log_prefix="{$mt $hdr(CSeq)} "

fork=yes
children=4

# do not derive extra aliases from reverse-DNS of the listen sockets
auto_aliases=no

# keep TCP connections open long enough that the registrar can route inbound
# requests (MESSAGE) back over the same client flow (connection reuse / RFC 5626)
tcp_connection_lifetime=3605
tcp_accept_no_cl=yes
tcp_rd_buf_size=16384

# treat this realm as a local domain so uri==myself / from_uri==myself match
alias="SIP_REALM"

# SIP transports - TCP is the one that matters for Workers; UDP kept for convenience
listen=udp:0.0.0.0:5060 advertise 127.0.0.1:5060
listen=tcp:0.0.0.0:5060 advertise 127.0.0.1:5060

# MSRP relay listener (raw TCP; the msrp module frames it, not the SIP parser)
listen=tcp:0.0.0.0:2855

#!ifdef WITH_TLS
listen=tls:0.0.0.0:5061 advertise 127.0.0.1:5061
#!endif

####### Modules #######

loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfgutils.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "xlog.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "auth.so"
loadmodule "path.so"
loadmodule "outbound.so"
loadmodule "nathelper.so"
loadmodule "msrp.so"

#!ifdef WITH_TLS
loadmodule "tls.so"
#!endif

# ----- tm -----
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# ----- rr -----
# do not append from-tag to the RR header (keeps things simple for pager-mode)
modparam("rr", "append_fromtag", 0)

# ----- usrloc: in-memory only, NO database -----
modparam("usrloc", "db_mode", 0)
modparam("usrloc", "use_domain", 0)

# ----- registrar -----
modparam("registrar", "method_filtering", 0)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "min_expires", 10)
modparam("registrar", "use_path", 1)
# path_mode 0 -> store Path even if the UA did not advertise Supported: path
modparam("registrar", "path_mode", 0)
# outbound_mode 1 -> RFC 5626 supported (accept ;ob / reg-id / +sip.instance, not required)
modparam("registrar", "outbound_mode", 1)
# share the received-URI AVP with nathelper so save() records the real client flow
modparam("registrar", "received_avp", "$avp(received_nh)")

# ----- nathelper: only used to capture the true source socket for flow reuse -----
modparam("nathelper", "received_avp", "$avp(received_nh)")

# ----- outbound (RFC 5626) -----
# secret used to sign/verify flow-tokens; fixed so tokens survive a restart
modparam("outbound", "flow_token_secret", "edgeport-outbound-secret")

# ----- path -----
modparam("path", "use_received", 1)

# ----- auth: qop + a fixed nonce secret so the challenge is stable -----
modparam("auth", "nonce_expire", 300)
modparam("auth", "secret", "edgeport-auth-secret")

# ----- msrp relay -----
modparam("msrp", "auth_min_expires", 60)
modparam("msrp", "auth_max_expires", 3600)
# host:port the relay advertises in the Use-Path it hands back to MSRP clients
modparam("msrp", "use_path_addr", "127.0.0.1:2855")

#!ifdef WITH_TLS
modparam("tls", "config", "/etc/kamailio/tls.cfg")
#!endif

####### Routing Logic #########

request_route {

	# per-request sanity + hop count
	route(REQINIT);

	# CANCEL
	if (is_method("CANCEL")) {
		if (t_check_trans()) {
			route(RELAY);
		}
		exit;
	}

	# retransmission / in-progress transaction handling
	if (!is_method("ACK")) {
		if (t_precheck_trans()) {
			t_check_trans();
			exit;
		}
		t_check_trans();
	}

	# in-dialog (has To-tag) requests follow the record-routed path
	route(WITHINDLG);

	### only initial requests (no To-tag) beyond this point

	# digest authentication (REGISTER -> 401, MESSAGE -> 407)
	route(AUTH);

	# strip any preloaded Route; only dialog-forming methods are record-routed
	remove_hf("Route");
	if (is_method("INVITE|SUBSCRIBE")) {
		record_route();
	}

	# REGISTER -> usrloc
	route(REGISTRAR);

	if ($rU == $null) {
		sl_send_reply("484", "Address Incomplete");
		exit;
	}

	# location lookup + relay (this is how MESSAGE reaches the target AOR)
	route(LOCATION);
	return;
}

# relay wrapper
route[RELAY] {
	if (!t_relay()) {
		sl_reply_error();
	}
	exit;
}

# per-request initial checks
route[REQINIT] {
	# replies are sent back over the existing connection, never a fresh one
	set_reply_no_connect();
	force_rport();

	if (!mf_process_maxfwd_header("10")) {
		sl_send_reply("483", "Too Many Hops");
		exit;
	}

	if (is_method("OPTIONS") && uri == myself && $rU == $null) {
		sl_send_reply("200", "Keepalive");
		exit;
	}

	if (!sanity_check("17895", "7")) {
		xlog("L_WARN", "malformed SIP request from $si:$sp\n");
		exit;
	}
}

# in-dialog requests
route[WITHINDLG] {
	if (!has_totag()) return;

	if (loose_route()) {
		route(RELAY);
		exit;
	}

	if (is_method("ACK")) {
		if (t_check_trans()) {
			route(RELAY);
			exit;
		}
		exit;
	}
	sl_send_reply("404", "Not Here");
	exit;
}

# digest auth against the static realm credential (no database)
route[AUTH] {
	if (is_method("REGISTER")) {
		if (!pv_www_authenticate("SIP_REALM", "SIP_PASSWORD", "0")) {
			$var(arc) = $rc;
			if ($var(arc) == -2) {
				xlog("L_INFO", "REGISTER auth: wrong password from $fu\n");
			}
			# 401 with WWW-Authenticate, qop=auth (flag 1)
			www_challenge("SIP_REALM", "1");
			exit;
		}
		return;
	}

	if (is_method("MESSAGE")) {
		if (!pv_proxy_authenticate("SIP_REALM", "SIP_PASSWORD", "0")) {
			# 407 with Proxy-Authenticate, qop=auth (flag 1)
			proxy_challenge("SIP_REALM", "1");
			exit;
		}
		# do not leak the Proxy-Authorization header downstream
		consume_credentials();
		return;
	}

	# no open relay: any other initial request must target a local domain
	if (uri != myself) {
		sl_send_reply("403", "Not Relaying");
		exit;
	}
	return;
}

# registrations (in-memory usrloc, RFC 5626 outbound aware)
route[REGISTRAR] {
	if (!is_method("REGISTER")) return;

	# record the true source socket so inbound requests reuse the client's flow
	fix_nated_register();

	if (!save("location")) {
		xlog("L_ERR", "REGISTER save failed for $tu\n");
		sl_reply_error();
		exit;
	}
	xlog("L_INFO", "REGISTER ok: AOR=$tu contact=$ct expires=$hdr(Expires)\n");
	exit;
}

# location lookup + relay (MESSAGE routing, RFC 3428)
route[LOCATION] {
	if (!lookup("location")) {
		$var(lrc) = $rc;
		t_newtran();
		switch ($var(lrc)) {
			case -1:
			case -3:
				send_reply("404", "Not Found");
				exit;
			case -2:
				send_reply("405", "Method Not Allowed");
				exit;
		}
		exit;
	}

	if (is_method("MESSAGE")) {
		xlog("L_INFO", "MESSAGE $fu -> $ru (du=$du)\n");
	}

	route(RELAY);
	exit;
}

####### MSRP relay #########
# RFC 4975/4976. clients first AUTH to the relay (digest, same realm/password) to
# obtain a Use-Path, then open MSRP sessions whose To-Path targets the relay
event_route[msrp:frame-in] {
	msrp_reply_flags("1");

	if (msrp_is_reply()) {
		msrp_relay();
		exit;
	}

	if ($msrp(method) == "AUTH") {
		# already past the first hop -> just forward
		if ($msrp(nexthops) > 0) {
			msrp_relay();
			exit;
		}
		# digest-authenticate the MSRP client against the static realm credential
		if (!pv_www_authenticate("SIP_REALM", "SIP_PASSWORD", "0", "$msrp(method)")) {
			if (auth_get_www_authenticate("SIP_REALM", "1", "$var(wauth)")) {
				msrp_reply("401", "Unauthorized", "$var(wauth)");
			} else {
				msrp_reply("500", "Server Internal Error");
			}
			exit;
		}
		# authenticated: remember this connection for the session and 200 it
		msrp_cmap_save();
		xlog("L_INFO", "MSRP AUTH ok from $si:$sp session=$msrp(sessid)\n");
		exit;
	}

	if ($msrp(method) == "SEND" || $msrp(method) == "REPORT") {
		# more than one hop left -> relay onward
		if ($msrp(nexthops) > 1) {
			if ($msrp(method) != "REPORT") {
				msrp_reply("200", "OK");
			}
			msrp_relay();
			exit;
		}
		# final hop -> deliver over the mapped connection
		if (msrp_cmap_lookup()) {
			if ($msrp(method) != "REPORT") {
				msrp_reply("200", "OK");
			}
			msrp_relay_flags("1");
			msrp_relay();
		} else {
			msrp_reply("481", "Session-Does-Not-Exist");
		}
		exit;
	}

	msrp_reply("501", "Request-Method-Not-Understood");
}
